name: Wakatime Charts
permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-charts:
    runs-on: ubuntu-latest
    steps:
      - uses: csiimnida/wakatime-charts@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: master
          IMAGES_FOLDER: images
          COMMIT_MESSAGE: "📊"
